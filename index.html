<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectcam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/nuzulul/webConnect.js@latest/dist/webconnect.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        video { background: #111; border-radius: 16px; object-fit: cover; }
        .message { max-width: 78%; padding: 12px 18px; border-radius: 20px; word-break: break-word; }
        .message.local { background: #22d3ee; color: #111; border-bottom-right-radius: 4px; }
        .message.remote { background: #27272a; border-bottom-left-radius: 4px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <!-- HEADER -->
    <header class="bg-zinc-900 border-b border-zinc-800 py-4 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-2xl flex items-center justify-center text-3xl">📹</div>
                <h1 class="text-3xl font-semibold">Projectcam</h1>
            </div>

            <div id="headerRight" class="hidden items-center gap-6">
                <div onclick="showProfile()" class="flex items-center gap-3 cursor-pointer hover:bg-zinc-800 p-2 rounded-2xl">
                    <img id="headerAvatar" src="https://picsum.photos/id/64/80/80" alt="avatar" 
                         class="w-9 h-9 rounded-2xl object-cover border border-cyan-400">
                    <div class="text-sm">
                        <div id="headerUsername" class="font-medium"></div>
                    </div>
                </div>

                <button onclick="toggleTheme()" class="text-2xl px-3 py-2 hover:bg-zinc-800 rounded-xl">🌗</button>

                <div class="flex gap-2">
                    <button onclick="startSearching()" id="btnStart" 
                            class="px-7 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold flex items-center gap-2">
                        ▶️ Start
                    </button>
                    <button onclick="stopConnection()" id="btnStop" disabled
                            class="px-7 py-3 bg-red-500 hover:bg-red-600 rounded-3xl font-semibold flex items-center gap-2">
                        ⏹️ Stop
                    </button>
                    <button onclick="nextPeer()" id="btnNext" disabled
                            class="px-7 py-3 bg-cyan-500 hover:bg-cyan-600 rounded-3xl font-semibold flex items-center gap-2">
                        ⏭️ Next
                    </button>
                    <button onclick="logout()" 
                            class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-3xl font-medium">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto flex h-[calc(100vh-73px)]">
        <!-- VIDEO SECTION -->
        <div class="flex-1 p-6 flex flex-col gap-6">
            <div class="grid grid-rows-2 gap-6 flex-1">
                <!-- Local Video -->
                <div class="relative rounded-3xl overflow-hidden bg-black shadow-2xl">
                    <video id="localVideo" autoplay muted playsinline class="w-full h-full"></video>
                    <div class="absolute top-6 left-6 bg-black/70 px-5 py-2 rounded-2xl text-sm font-medium">
                        <span id="localName">You</span>
                    </div>
                    <div class="absolute bottom-6 left-6 flex gap-3">
                        <button onclick="toggleCamera()" id="camBtn" class="bg-black/70 px-6 py-3 rounded-3xl text-sm">📷 ON</button>
                        <button onclick="toggleMic()" id="micBtn" class="bg-black/70 px-6 py-3 rounded-3xl text-sm">🎤 ON</button>
                    </div>
                </div>

                <!-- Remote Video -->
                <div class="relative rounded-3xl overflow-hidden bg-black shadow-2xl">
                    <video id="remoteVideo" autoplay playsinline class="w-full h-full"></video>
                    <div class="absolute top-6 left-6 bg-black/70 px-5 py-2 rounded-2xl text-sm font-medium" id="remoteName">Stranger</div>
                </div>
            </div>
        </div>

        <!-- CHAT SECTION -->
        <div class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
            <div class="p-5 border-b border-zinc-700 font-medium flex justify-between items-center">
                <span>P2P Chat</span>
                <span id="chatStatus" class="text-xs bg-zinc-800 px-4 py-1 rounded-full">Waiting for peer</span>
            </div>
            <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-zinc-950"></div>
            <div class="p-5 border-t border-zinc-700">
                <div class="flex gap-3">
                    <input id="chatInput" type="text" placeholder="Type a message..." 
                           class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 focus:border-cyan-400 outline-none"
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-cyan-500 text-black px-8 rounded-3xl font-semibold">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl overflow-hidden">
            <div class="p-8">
                <h2 id="modalTitle" class="text-3xl font-semibold mb-1">Welcome to Projectcam</h2>
                <p id="modalDesc" class="text-zinc-400">Sign in to start random video chats</p>
            </div>

            <div class="px-8 space-y-5 pb-8">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Username</label>
                    <input id="username" type="text" placeholder="yourname" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                </div>

                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Password</label>
                    <input id="password" type="password" placeholder="••••••••" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                </div>

                <!-- Register-only fields -->
                <div id="registerFields" class="hidden space-y-5">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Avatar (optional)</label>
                        <div class="flex gap-4 items-center">
                            <img id="previewAvatar" src="https://picsum.photos/id/64/80/80" class="w-20 h-20 rounded-2xl object-cover">
                            <label class="cursor-pointer bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl text-sm">
                                Choose photo
                                <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="handleAvatarUpload()">
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Gender</label>
                        <select id="gender" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="LGBTQIA+">LGBTQIA+</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Security Question (for recovery)</label>
                        <input id="securityQuestion" type="text" placeholder="What was your first pet's name?" 
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                    </div>
                </div>

                <button onclick="handleAuth()" id="authBtn"
                        class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-3xl text-lg transition">
                    Login
                </button>

                <div class="flex justify-between text-sm pt-2">
                    <button onclick="toggleRegister()" id="toggleBtn" class="text-cyan-400 hover:underline">
                        Create new account
                    </button>
                    <button onclick="showForgotPassword()" class="text-zinc-400 hover:text-white">
                        Forgot password?
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { gdb } from "https://cdn.jsdelivr.net/npm/genosdb@latest/dist/index.min.js";

        let db = null;
        let currentUser = null;
        let wc = null;
        let localStream = null;
        let currentPeerId = null;
        let avatarBase64 = null;
        let isRegisterMode = false;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const messagesDiv = document.getElementById('messages');

        function hash(str) {
            return btoa(str + "projectcam_salt_2026");
        }

        async function initDB() {
            if (!db) {
                db = await gdb('projectcam', { rtc: true });
            }
        }

        function toggleRegister() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('registerFields').classList.toggle('hidden', !isRegisterMode);
            document.getElementById('modalTitle').textContent = isRegisterMode ? "Create Account" : "Login";
            document.getElementById('authBtn').textContent = isRegisterMode ? "Register" : "Login";
            document.getElementById('toggleBtn').textContent = isRegisterMode ? "Back to Login" : "Create new account";
        }

        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert("Username and password are required");
                return;
            }

            try {
                await initDB();

                if (isRegisterMode) {
                    const gender = document.getElementById('gender').value;
                    const securityQ = document.getElementById('securityQuestion').value.trim();

                    if (!securityQ) {
                        alert("Security question is required for password recovery");
                        return;
                    }

                    currentUser = {
                        username,
                        passwordHash: hash(password),
                        avatar: avatarBase64 || "https://picsum.photos/id/64/80/80",
                        gender,
                        securityQuestion: securityQ,
                        created: Date.now()
                    };

                    await db.put(`users/${username}`, currentUser);
                    finishLogin();
                } else {
                    const userData = await db.get(`users/${username}`);
                    if (userData && userData.passwordHash === hash(password)) {
                        currentUser = userData;
                        finishLogin();
                    } else {
                        alert("Incorrect username or password");
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Database error. Please try again.");
            }
        }

        function finishLogin() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('headerRight').classList.remove('hidden');
            document.getElementById('headerUsername').textContent = currentUser.username;
            document.getElementById('headerAvatar').src = currentUser.avatar;
            document.getElementById('localName').textContent = currentUser.username;
        }

        function showForgotPassword() {
            const username = prompt("Enter your username:");
            if (!username) return;

            initDB().then(() => {
                db.get(`users/${username}`).then(userData => {
                    if (!userData || !userData.securityQuestion) {
                        alert("No recovery data found.");
                        return;
                    }
                    const answer = prompt(userData.securityQuestion + "\n\nEnter your answer:");
                    if (answer) {
                        alert("In this demo, if the answer matches you can reset your password.\n\n(Just remember your password for now.)");
                    }
                });
            });
        }

        function handleAvatarUpload() {
            const file = document.getElementById('avatarUpload').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                avatarBase64 = e.target.result;
                document.getElementById('previewAvatar').src = avatarBase64;
            };
            reader.readAsDataURL(file);
        }

        function showProfile() {
            if (!currentUser) return;
            alert(`👤 ${currentUser.username}\n⚧ ${currentUser.gender || 'Not set'}\nJoined: ${new Date(currentUser.created).toLocaleDateString()}`);
        }

        function logout() {
            if (confirm("Logout from Projectcam?")) {
                stopConnection();
                document.getElementById('headerRight').classList.add('hidden');
                document.getElementById('authModal').style.display = 'flex';
                currentUser = null;
            }
        }

        // ================== P2P Video Chat ==================
        async function startLocalStream() {
            if (localStream) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (err) {
                alert("Camera and microphone access required for video chat");
            }
        }

        async function startSearching() {
            await startLocalStream();

            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnNext').disabled = false;

            wc = new WebConnect({ room: 'projectcam-public' });

            wc.on('peer-joined', (peer) => {
                if (!currentPeerId) {
                    currentPeerId = peer.id;
                    document.getElementById('chatStatus').textContent = "Connected";
                    document.getElementById('remoteName').textContent = "Peer " + peer.id.slice(0,8);
                }
            });

            wc.on('stream', (stream, peerId) => {
                if (peerId === currentPeerId) remoteVideo.srcObject = stream;
            });

            wc.on('data', (data, peerId) => {
                if (peerId === currentPeerId) addMessage(data, 'remote');
            });

            wc.addStream(localStream);
        }

        function stopConnection() {
            if (wc) wc.destroy();
            wc = null;
            currentPeerId = null;
            remoteVideo.srcObject = null;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnNext').disabled = true;
            document.getElementById('chatStatus').textContent = "Waiting for peer";
        }

        function nextPeer() {
            addMessage("You went to next stranger", "local");
            stopConnection();
            setTimeout(startSearching, 700);
        }

        function toggleCamera() {
            if (!localStream) return;
            const track = localStream.getVideoTracks()[0];
            if (track) track.enabled = !track.enabled;
            document.getElementById('camBtn').textContent = track.enabled ? "📷 ON" : "📷 OFF";
        }

        function toggleMic() {
            if (!localStream) return;
            const track = localStream.getAudioTracks()[0];
            if (track) track.enabled = !track.enabled;
            document.getElementById('micBtn').textContent = track.enabled ? "🎤 ON" : "🎤 OFF";
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !wc) return;
            wc.sendData(text);
            addMessage(text, 'local');
            input.value = '';
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Initialize app
        window.onload = () => {
            document.getElementById('authModal').style.display = 'flex';
        };
    </script>
</body>
</html>
