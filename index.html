<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectcam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/nuzulul/webConnect.js@latest/dist/webconnect.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        video { background: #111; border-radius: 16px; object-fit: cover; }
        .message { max-width: 78%; padding: 12px 18px; border-radius: 20px; word-break: break-word; }
        .message.local { background: #22d3ee; color: #111; }
        .message.remote { background: #27272a; }
        .room-card { transition: all 0.2s; }
        .room-card:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- HEADER -->
    <header class="bg-zinc-900 border-b border-zinc-800 py-4 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-2xl flex items-center justify-center text-3xl">📹</div>
                <h1 class="text-3xl font-semibold">Projectcam</h1>
            </div>

            <div id="headerRight" class="hidden items-center gap-6">
                <div onclick="showProfile()" class="flex items-center gap-3 cursor-pointer hover:bg-zinc-800 p-2 rounded-2xl">
                    <img id="headerAvatar" src="https://picsum.photos/id/64/80/80" alt="avatar" class="w-9 h-9 rounded-2xl object-cover border border-cyan-400">
                    <div>
                        <div id="headerUsername" class="font-medium"></div>
                        <div id="headerRoomName" class="text-xs text-zinc-400"></div>
                    </div>
                </div>

                <button onclick="toggleTheme()" class="text-2xl px-3 py-2 hover:bg-zinc-800 rounded-xl">🌗</button>

                <div class="flex gap-2">
                    <button onclick="showDashboard()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-3xl font-medium">Discover Rooms</button>
                    <button onclick="showMyRoom()" class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 rounded-3xl font-medium">My Room</button>
                    <button onclick="startRandom()" id="btnStart" class="px-7 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold flex items-center gap-2">▶️ Random</button>
                    <button onclick="logout()" class="px-6 py-3 bg-zinc-700 hover:bg-zinc-600 rounded-3xl font-medium">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- DASHBOARD - Discover Rooms -->
    <div id="dashboard" class="max-w-screen-2xl mx-auto p-6">
        <h2 class="text-2xl font-semibold mb-6">Discover Rooms</h2>
        <input id="searchInput" type="text" placeholder="Search rooms or usernames..." 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg focus:border-cyan-400 outline-none mb-8"
               onkeyup="filterRooms()">

        <div id="roomsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- VIDEO CHAT VIEW -->
    <div id="videoView" class="hidden max-w-screen-2xl mx-auto flex h-[calc(100vh-73px)]">
        <div class="flex-1 p-6 flex flex-col gap-6">
            <div class="grid grid-rows-2 gap-6 flex-1">
                <!-- Local -->
                <div class="relative rounded-3xl overflow-hidden bg-black shadow-2xl">
                    <video id="localVideo" autoplay muted playsinline class="w-full h-full"></video>
                    <div class="absolute top-6 left-6 bg-black/70 px-5 py-2 rounded-2xl text-sm font-medium">
                        <span id="localName">cam1 - You</span>
                    </div>
                    <div class="absolute bottom-6 left-6 flex gap-3">
                        <button onclick="toggleCamera()" id="camBtn" class="bg-black/70 px-6 py-3 rounded-3xl text-sm">📷 ON</button>
                        <button onclick="toggleMic()" id="micBtn" class="bg-black/70 px-6 py-3 rounded-3xl text-sm">🎤 ON</button>
                    </div>
                </div>

                <!-- Remote -->
                <div class="relative rounded-3xl overflow-hidden bg-black shadow-2xl">
                    <video id="remoteVideo" autoplay playsinline class="w-full h-full"></video>
                    <div id="remotePlaceholder" class="absolute inset-0 flex items-center justify-center text-zinc-400 text-xl font-medium bg-black/70">
                        Waiting for peer...
                    </div>
                    <div class="absolute top-6 left-6 bg-black/70 px-5 py-2 rounded-2xl text-sm font-medium" id="remoteName">cam2 - Stranger</div>
                    <button onclick="kickPeer()" id="kickBtn" class="hidden absolute top-6 right-6 bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-2xl text-sm font-medium">Kick Peer</button>
                </div>
            </div>
        </div>

        <!-- Chat -->
        <div class="w-96 bg-zinc-900 border-l border-zinc-800 flex flex-col">
            <div class="p-5 border-b border-zinc-700 font-medium">P2P Chat</div>
            <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-4 bg-zinc-950"></div>
            <div class="p-5 border-t border-zinc-700">
                <div class="flex gap-3">
                    <input id="chatInput" type="text" placeholder="Type a message..." 
                           class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 focus:border-cyan-400 outline-none"
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="bg-cyan-500 text-black px-8 rounded-3xl font-semibold">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-md mx-4 rounded-3xl overflow-hidden">
            <div class="p-8">
                <h2 id="modalTitle" class="text-3xl font-semibold mb-1">Welcome to Projectcam</h2>
                <p id="modalDesc" class="text-zinc-400">Create your room and meet new people</p>
            </div>

            <div class="px-8 space-y-5 pb-8">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Username</label>
                    <input id="username" type="text" placeholder="yourname" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Password</label>
                    <input id="password" type="password" placeholder="••••••••" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                </div>

                <div id="registerFields" class="hidden space-y-5">
                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Avatar (optional)</label>
                        <div class="flex gap-4 items-center">
                            <img id="previewAvatar" src="https://picsum.photos/id/64/80/80" class="w-20 h-20 rounded-2xl object-cover">
                            <label class="cursor-pointer bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-2xl text-sm">
                                Choose photo
                                <input type="file" id="avatarUpload" accept="image/*" class="hidden" onchange="handleAvatarUpload()">
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Gender</label>
                        <select id="gender" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="LGBTQIA+">LGBTQIA+</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Room Name</label>
                        <input id="roomName" type="text" placeholder="My Chill Room" maxlength="30" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Intro / About Me (max 50 chars)</label>
                        <input id="intro" type="text" placeholder="Just here to chat..." maxlength="50" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                    </div>

                    <div>
                        <label class="text-xs text-zinc-400 block mb-1">Security Question</label>
                        <input id="securityQuestion" type="text" placeholder="What was your first pet's name?" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-cyan-400 outline-none">
                    </div>
                </div>

                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-3xl text-lg transition">
                    Login
                </button>

                <div class="flex justify-between text-sm pt-2">
                    <button onclick="toggleRegister()" id="toggleBtn" class="text-cyan-400 hover:underline">Create new account</button>
                    <button onclick="showForgotPassword()" class="text-zinc-400 hover:text-white">Forgot password?</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GunDB with multiple global relays
        const gun = Gun({
            peers: [
                'https://gun-manhattan.herokuapp.com/gun',
                'https://gunjs.herokuapp.com/gun',
                'https://relay.peer.ooo/gun',
                'https://gun-relay.herokuapp.com/gun'
            ]
        });
        const userGun = gun.user();

        window.currentUser = null;
        window.wc = null;
        window.localStream = null;
        window.isRegisterMode = false;
        window.avatarBase64 = null;
        window.isOwner = false;

        const doorbell = new Audio('https://freesound.org/data/previews/276/276951_5123854-lq.mp3');

        function hash(str) { return btoa(str + "projectcam_salt_2026"); }

        function toggleRegister() {
            window.isRegisterMode = !window.isRegisterMode;
            document.getElementById('registerFields').classList.toggle('hidden', !window.isRegisterMode);
            document.getElementById('modalTitle').textContent = window.isRegisterMode ? "Create Account" : "Login";
            document.getElementById('authBtn').textContent = window.isRegisterMode ? "Register" : "Login";
            document.getElementById('toggleBtn').textContent = window.isRegisterMode ? "Back to Login" : "Create new account";
        }

        function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) return alert("Username and password required");

            if (window.isRegisterMode) {
                const roomName = document.getElementById('roomName').value.trim() || username + "'s Room";
                const intro = document.getElementById('intro').value.trim().slice(0, 50);
                const gender = document.getElementById('gender').value;
                const securityQ = document.getElementById('securityQuestion').value.trim();

                if (!securityQ) return alert("Security question is required");

                userGun.create(username, password, ack => {
                    if (ack.err) {
                        alert(ack.err.includes("already") ? "Username already taken. Please login." : ack.err);
                        return;
                    }
                    userGun.auth(username, password, () => {
                        const data = {
                            username,
                            avatar: window.avatarBase64 || "https://picsum.photos/id/64/80/80",
                            gender,
                            roomName,
                            intro,
                            securityQuestion: securityQ,
                            created: Date.now(),
                            status: "open"
                        };
                        gun.get(`users/${username}`).put(data);
                        window.currentUser = data;
                        finishLogin();
                    });
                });
            } else {
                userGun.auth(username, password, ack => {
                    if (ack.err) return alert("Incorrect username or password");
                    gun.get(`users/${username}`).once(data => {
                        window.currentUser = data || { username };
                        finishLogin();
                    });
                });
            }
        }

        function finishLogin() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('headerRight').classList.remove('hidden');
            document.getElementById('headerUsername').textContent = window.currentUser.username;
            document.getElementById('headerRoomName').textContent = window.currentUser.roomName || '';
            document.getElementById('headerAvatar').src = window.currentUser.avatar;
            document.getElementById('dashboard').style.display = 'block';
            loadRooms();
        }

        function showForgotPassword() {
            const username = prompt("Enter your username:");
            if (!username) return;
            gun.get(`users/${username}`).once(data => {
                if (!data) return alert("User not found");
                const answer = prompt(data.securityQuestion + "\n\nEnter your answer:");
                if (answer) alert("Demo mode - remember your password.");
            });
        }

        function handleAvatarUpload() {
            const file = document.getElementById('avatarUpload').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                window.avatarBase64 = e.target.result;
                document.getElementById('previewAvatar').src = window.avatarBase64;
            };
            reader.readAsDataURL(file);
        }

        function showProfile() {
            if (!window.currentUser) return;
            alert(`👤 ${window.currentUser.username}\nRoom: ${window.currentUser.roomName}\nIntro: ${window.currentUser.intro || 'None'}`);
        }

        function logout() {
            if (confirm("Logout?")) {
                stopConnection();
                document.getElementById('headerRight').classList.add('hidden');
                document.getElementById('authModal').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'block';
                window.currentUser = null;
            }
        }

        // Load Discover Rooms
        function loadRooms() {
            const grid = document.getElementById('roomsGrid');
            grid.innerHTML = '';

            gun.get('users').map().once((u, key) => {
                if (!u || !u.roomName) return;

                const isOpen = u.status !== "occupied";

                const card = document.createElement('div');
                card.className = `room-card bg-zinc-900 border border-zinc-700 rounded-3xl p-5`;
                card.innerHTML = `
                    <div class="aspect-video bg-black rounded-2xl mb-4 overflow-hidden relative">
                        <img src="${u.avatar}" class="w-full h-full object-cover">
                        <div class="absolute top-3 right-3 px-3 py-1 text-xs font-medium rounded-full ${isOpen ? 'bg-emerald-500 text-black' : 'bg-red-500 text-white'}">
                            ${isOpen ? 'Open' : 'Occupied'}
                        </div>
                    </div>
                    <div class="font-semibold text-lg">${u.roomName}</div>
                    <div class="text-zinc-400 text-sm mt-1 line-clamp-2">${u.intro || 'No intro'}</div>
                    <div class="flex items-center gap-3 mt-5">
                        <img src="${u.avatar}" class="w-8 h-8 rounded-2xl">
                        <div>
                            <div class="text-sm font-medium">${u.username}</div>
                            <div class="text-xs text-zinc-500">${u.gender || ''}</div>
                        </div>
                    </div>
                    <button onclick="joinRoom('${key}'); event.stopImmediatePropagation();" 
                            class="mt-4 w-full py-3 bg-cyan-500 hover:bg-cyan-600 text-black font-semibold rounded-2xl">
                        Open to Chat
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function filterRooms() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.room-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function showDashboard() {
            document.getElementById('videoView').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';
        }

        function showMyRoom() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('videoView').classList.remove('hidden');
            document.getElementById('kickBtn').classList.toggle('hidden', !window.isOwner);
        }

        // Join Room
        async function startLocalStream() {
            if (window.localStream) return;
            window.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = window.localStream;
        }

        async function joinRoom(hostKey) {
            await startLocalStream();
            window.isOwner = (hostKey === window.currentUser.username);

            window.wc = new WebConnect({ room: `projectcam-room-${hostKey}` });

            window.wc.on('peer-joined', () => {
                doorbell.play();
                document.getElementById('remotePlaceholder').style.display = 'none';
                document.getElementById('remoteName').textContent = "cam2 - Guest";
                document.getElementById('kickBtn').classList.toggle('hidden', !window.isOwner);

                if (window.isOwner) gun.get(`users/${hostKey}`).put({ status: "occupied" });
            });

            window.wc.on('peer-left', () => {
                document.getElementById('remotePlaceholder').style.display = 'flex';
                document.getElementById('remoteName').textContent = "cam2 - Stranger";
                document.getElementById('kickBtn').classList.add('hidden');
                if (window.isOwner) gun.get(`users/${hostKey}`).put({ status: "open" });
            });

            window.wc.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                document.getElementById('remotePlaceholder').style.display = 'none';
            });

            window.wc.on('data', (data) => addMessage(data, 'remote'));

            window.wc.addStream(window.localStream);

            showMyRoom();
        }

        async function startRandom() {
            await startLocalStream();
            window.isOwner = false;
            window.wc = new WebConnect({ room: 'projectcam-public-random' });
            window.wc.on('peer-joined', () => doorbell.play());
            window.wc.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                document.getElementById('remotePlaceholder').style.display = 'none';
            });
            window.wc.on('data', (data) => addMessage(data, 'remote'));
            window.wc.addStream(window.localStream);
            showMyRoom();
        }

        function stopConnection() {
            if (window.wc) window.wc.destroy();
            window.wc = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('remotePlaceholder').style.display = 'flex';
            document.getElementById('kickBtn').classList.add('hidden');
        }

        function kickPeer() {
            if (window.wc && confirm("Kick this peer?")) {
                window.wc.destroy();
                window.wc = null;
                document.getElementById('remoteVideo').srcObject = null;
                document.getElementById('remotePlaceholder').style.display = 'flex';
                document.getElementById('kickBtn').classList.add('hidden');
                addMessage("You kicked the peer", "local");
            }
        }

        function nextPeer() {
            addMessage("You went to next stranger", "local");
            stopConnection();
            setTimeout(startRandom, 700);
        }

        function toggleCamera() {
            if (!window.localStream) return;
            const track = window.localStream.getVideoTracks()[0];
            if (track) track.enabled = !track.enabled;
            document.getElementById('camBtn').textContent = track.enabled ? "📷 ON" : "📷 OFF";
        }

        function toggleMic() {
            if (!window.localStream) return;
            const track = window.localStream.getAudioTracks()[0];
            if (track) track.enabled = !track.enabled;
            document.getElementById('micBtn').textContent = track.enabled ? "🎤 ON" : "🎤 OFF";
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !window.wc) return;
            window.wc.sendData(text);
            addMessage(text, 'local');
            input.value = '';
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Initialize
        window.onload = () => {
            document.getElementById('authModal').style.display = 'flex';
        };
    </script>
</body>
</html>
