<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure P2P Video Chat - webconnect.js</title>
    <script src="https://cdn.jsdelivr.net/gh/nuzulul/webConnect.js@latest/dist/webconnect.min.js"></script>
    <style>
        body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; display:flex; height:100vh; overflow:hidden; }
        .container { display:flex; width:100%; height:100%; }
        .video-section { flex:4; padding:15px; background:#1a1a1a; display:flex; flex-direction:column; gap:12px; }
        .chat-section { flex:6; display:flex; flex-direction:column; background:#222; border-left:2px solid #333; }
        video { width:100%; background:#000; border-radius:10px; object-fit:cover; }
        .local-video { height:42%; }
        .remote-video { height:58%; }
        .video-wrapper { position:relative; }
        .name-label { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.7); padding:6px 14px; border-radius:6px; font-size:14px; z-index:10; }
        .controls { display:flex; gap:12px; margin-top:15px; justify-content:center; flex-wrap:wrap; }
        button { padding:12px 24px; font-size:16px; border:none; border-radius:30px; cursor:pointer; font-weight:bold; }
        .btn-start { background:#28a745; color:white; }
        .btn-stop  { background:#dc3545; color:white; }
        .btn-next  { background:#007bff; color:white; }
        .status { padding:12px; text-align:center; font-size:15px; background:#222; border-radius:6px; margin-top:8px; }
        .chat-header { padding:15px; background:#1a1a1a; border-bottom:1px solid #333; font-weight:bold; }
        .messages { flex:1; padding:15px; overflow-y:auto; background:#1a1a1a; display:flex; flex-direction:column; gap:10px; }
        .message { max-width:80%; padding:10px 14px; border-radius:18px; word-wrap:break-word; }
        .message.local  { align-self:flex-end; background:#007bff; color:white; }
        .message.remote { align-self:flex-start; background:#333; }
        .chat-input { padding:15px; background:#1a1a1a; display:flex; gap:10px; border-top:1px solid #333; }
        input { flex:1; padding:12px 18px; border:none; border-radius:25px; background:#333; color:white; }
        .send-btn { padding:12px 24px; background:#007bff; color:white; border:none; border-radius:25px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Videos -->
        <div class="video-section">
            <div class="video-wrapper">
                <div class="name-label" id="local-name">You</div>
                <video id="localVideo" class="local-video" autoplay muted playsinline></video>
            </div>
            <div class="video-wrapper">
                <div class="name-label" id="remote-name">Connected Peer</div>
                <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
            </div>

            <div class="status" id="status">Click Start to join P2P mesh</div>

            <div class="controls">
                <button class="btn-start" id="btnStart" onclick="startConnection()">Start</button>
                <button class="btn-stop"  id="btnStop"  onclick="stopConnection()" disabled>Stop</button>
                <button class="btn-next"  id="btnNext"  onclick="nextPeer()" disabled>Next</button>
            </div>
        </div>

        <!-- Chat -->
        <div class="chat-section">
            <div class="chat-header">P2P Data Channel Chat</div>
            <div class="messages" id="messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." disabled>
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let wc = null;
        let localStream = null;
        let currentPeerId = null;
        let dataChannel = null;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');

        async function startLocalStream() {
            if (localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
        }

        async function startConnection() {
            await startLocalStream();
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnNext').disabled = false;
            chatInput.disabled = false;

            setStatus('Joining P2P mesh... (webconnect.js)', '#ffaa00');

            // Initialize webconnect.js - you can change room name for "rooms"
            wc = new WebConnect({
                room: 'omegle-like-room',     // Change this to create different "rooms"
                // You can add more options like signaling protocols if needed
            });

            wc.on('peer-joined', (peer) => {
                console.log('New peer joined:', peer.id);
                if (!currentPeerId) {
                    currentPeerId = peer.id;
                    setStatus('Connected to peer: ' + peer.id.substring(0,8), '#28a745');
                    // For simplicity, we take the first peer as "remote"
                    setupPeerConnection(peer);
                }
            });

            wc.on('peer-left', (peerId) => {
                if (peerId === currentPeerId) {
                    setStatus('Peer disconnected', '#ff4444');
                    currentPeerId = null;
                    remoteVideo.srcObject = null;
                }
            });

            // Handle incoming media / data
            wc.on('stream', (stream, peerId) => {
                if (peerId === currentPeerId || !remoteVideo.srcObject) {
                    remoteVideo.srcObject = stream;
                }
            });

            wc.on('data', (data, peerId) => {
                if (peerId === currentPeerId) {
                    addMessage(data, 'remote');
                }
            });

            // Share our local stream to the mesh
            wc.addStream(localStream);

            setStatus('Waiting for peers in the mesh...', '#ffaa00');
        }

        function setupPeerConnection(peer) {
            // webconnect.js handles most of the heavy lifting
            console.log('Setting up with peer:', peer.id);
        }

        function stopConnection() {
            if (wc) {
                wc.destroy();
                wc = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            remoteVideo.srcObject = null;
            currentPeerId = null;
            resetUI();
            setStatus('Connection stopped');
        }

        function nextPeer() {
            addMessage('Skipping to next peer...', 'local');
            stopConnection();
            setTimeout(startConnection, 800);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !wc) return;
            wc.sendData(text);           // Broadcasts to all connected peers
            addMessage(text, 'local');
            chatInput.value = '';
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setStatus(text, color = '#aaa') {
            statusEl.textContent = text;
            statusEl.style.color = color;
        }

        function resetUI() {
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnNext').disabled = true;
            chatInput.disabled = true;
        }

        // Keyboard support
        chatInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (wc) wc.destroy();
        });

        // Initial status
        window.onload = () => {
            setStatus('Click **Start** to join pure P2P mesh (no server)');
        };
    </script>
</body>
</html>
