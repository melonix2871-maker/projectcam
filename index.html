<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectcam</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/nuzulul/webConnect.js@latest/dist/webconnect.min.js"></script>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#111; color:#fff; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        header { background:#1a1a1a; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #333; }
        h1 { margin:0; font-size:24px; }
        .controls { display:flex; gap:10px; }
        button { padding:10px 20px; border:none; border-radius:30px; font-weight:bold; cursor:pointer; }
        .btn-start { background:#28a745; color:white; }
        .btn-stop  { background:#dc3545; color:white; }
        .btn-next  { background:#007bff; color:white; }
        .main { flex:1; display:flex; }
        .video-section { flex:4; padding:15px; background:#1a1a1a; display:flex; flex-direction:column; gap:12px; }
        .chat-section { flex:6; display:flex; flex-direction:column; background:#222; border-left:2px solid #333; }
        video { width:100%; background:#000; border-radius:10px; object-fit:cover; }
        .local-video { height:42%; }
        .remote-video { height:58%; }
        .video-wrapper { position:relative; }
        .name-label { position:absolute; top:12px; left:12px; background:rgba(0,0,0,0.7); padding:6px 14px; border-radius:6px; font-size:14px; }
        .status { padding:12px; text-align:center; background:#222; border-radius:6px; margin-top:8px; }
        .chat-header { padding:15px; background:#1a1a1a; border-bottom:1px solid #333; font-weight:bold; }
        .messages { flex:1; padding:15px; overflow-y:auto; background:#1a1a1a; display:flex; flex-direction:column; gap:10px; }
        .message { max-width:80%; padding:10px 14px; border-radius:18px; word-wrap:break-word; }
        .message.local  { align-self:flex-end; background:#007bff; color:white; }
        .message.remote { align-self:flex-start; background:#333; }
        .chat-input { padding:15px; background:#1a1a1a; display:flex; gap:10px; border-top:1px solid #333; }
        input { flex:1; padding:12px 18px; border:none; border-radius:25px; background:#333; color:white; }
        .send-btn { padding:12px 24px; background:#007bff; color:white; border:none; border-radius:25px; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:100; }
        .modal-content { background:#222; padding:30px; border-radius:12px; width:90%; max-width:420px; }
        input[type="text"], input[type="password"] { width:100%; padding:12px; margin:8px 0; background:#333; border:none; color:white; border-radius:6px; }
    </style>
</head>
<body>
    <header>
        <h1>Projectcam</h1>
        <div class="controls" id="headerControls" style="display:none;">
            <button class="btn-start" onclick="startSearching()">Start</button>
            <button class="btn-stop" onclick="stopConnection()">Stop</button>
            <button class="btn-next" onclick="nextPeer()">Next</button>
        </div>
        <div id="usernameDisplay" style="display:none;"></div>
    </header>

    <div class="main">
        <!-- Video Section -->
        <div class="video-section">
            <div class="video-wrapper">
                <div class="name-label" id="local-name">You</div>
                <video id="localVideo" class="local-video" autoplay muted playsinline></video>
            </div>
            <div class="video-wrapper">
                <div class="name-label" id="remote-name">Stranger</div>
                <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
            </div>
            <div class="status" id="status">Please login or register first</div>
        </div>

        <!-- Chat -->
        <div class="chat-section">
            <div class="chat-header">P2P Chat</div>
            <div class="messages" id="messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." disabled>
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Login / Register Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2 id="modalTitle">Welcome to Projectcam</h2>
            <input type="text" id="alias" placeholder="Username (alias)">
            <input type="password" id="pass" placeholder="Passphrase">
            <div id="registerFields" style="display:none;">
                <input type="text" id="securityQ" placeholder="Security Question (e.g. What is your favorite color?)">
                <input type="text" id="securityA" placeholder="Answer (used for recovery)">
            </div>
            <button onclick="toggleMode()" id="toggleBtn" style="margin:10px 0; width:100%; padding:12px;">Need to Register? Click here</button>
            <button onclick="handleAuth()" id="authBtn" style="width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:6px;">Login</button>
            <button onclick="recoverPassword()" style="margin-top:10px; width:100%; padding:10px; background:#666; color:white; border:none; border-radius:6px;">Forgot Passphrase?</button>
            <p id="authMessage" style="margin-top:10px; text-align:center; color:#ffaa00;"></p>
        </div>
    </div>

    <script>
        // GunDB setup (public relay peers)
        const gun = Gun({
            peers: ['https://gun-manhattan.herokuapp.com/gun', 'https://gunjs.herokuapp.com/gun']
        });
        const user = gun.user();
        let currentUserAlias = null;
        let wc = null;
        let localStream = null;
        let currentPeerId = null;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');

        let isRegisterMode = false;

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('registerFields').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('modalTitle').textContent = isRegisterMode ? 'Register New User' : 'Login to Projectcam';
            document.getElementById('authBtn').textContent = isRegisterMode ? 'Register' : 'Login';
            document.getElementById('toggleBtn').textContent = isRegisterMode ? 'Already have account? Login' : 'Need to Register? Click here';
        }

        async function handleAuth() {
            const alias = document.getElementById('alias').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const messageEl = document.getElementById('authMessage');

            if (!alias || !pass) {
                messageEl.textContent = "Username and passphrase required";
                return;
            }

            if (isRegisterMode) {
                const q = document.getElementById('securityQ').value.trim();
                const a = document.getElementById('securityA').value.trim();
                if (!q || !a) {
                    messageEl.textContent = "Security question and answer required for recovery";
                    return;
                }

                user.create(alias, pass, (ack) => {
                    if (ack.err) {
                        messageEl.textContent = ack.err;
                    } else {
                        // Store security question encrypted
                        user.auth(alias, pass, () => {
                            const encAnswer = SEA.encrypt(a, pass);
                            gun.get(`~${user.is.pub}`).get('security').put({ q, a: encAnswer });
                            finishLogin(alias);
                        });
                    }
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) {
                        messageEl.textContent = "Login failed. Check username/passphrase.";
                    } else {
                        finishLogin(alias);
                    }
                });
            }
        }

        function recoverPassword() {
            const alias = prompt("Enter your username:");
            if (!alias) return;
            const answer = prompt("Answer your security question:");
            if (!answer) return;

            // In real app you'd fetch the question first, but for simplicity:
            gun.get(`~${user.is ? user.is.pub : 'unknown'}`).get('security').once(async (data) => {
                if (!data) return alert("No recovery data found.");
                try {
                    const decrypted = await SEA.decrypt(data.a, answer);
                    if (decrypted) {
                        alert("Recovery successful! You can now login with your passphrase.");
                    } else {
                        alert("Wrong answer.");
                    }
                } catch(e) {
                    alert("Recovery failed.");
                }
            });
        }

        function finishLogin(alias) {
            currentUserAlias = alias;
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('usernameDisplay').textContent = `Logged in as: ${alias}`;
            document.getElementById('usernameDisplay').style.display = 'block';
            document.getElementById('headerControls').style.display = 'flex';
            statusEl.textContent = `Welcome ${alias}! Click Start to find peers.`;
            // Your personal room = alias
        }

        async function startLocalStream() {
            if (localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
        }

        async function startSearching() {
            await startLocalStream();
            document.getElementById('headerControls').querySelectorAll('button').forEach(b => b.disabled = false);

            wc = new WebConnect({ room: `projectcam-${currentUserAlias || 'public'}` });

            wc.on('peer-joined', (peer) => {
                if (!currentPeerId) {
                    currentPeerId = peer.id;
                    statusEl.textContent = `Connected to ${peer.id.substring(0,8)}`;
                    remoteVideo.srcObject = peer.stream || null; // webconnect may expose stream
                }
            });

            wc.on('stream', (stream, peerId) => {
                if (peerId === currentPeerId) remoteVideo.srcObject = stream;
            });

            wc.on('data', (data, peerId) => {
                if (peerId === currentPeerId) addMessage(data, 'remote');
            });

            wc.addStream(localStream);
            statusEl.textContent = 'Looking for other users in the mesh...';
        }

        function stopConnection() {
            if (wc) wc.destroy();
            wc = null;
            currentPeerId = null;
            remoteVideo.srcObject = null;
            statusEl.textContent = 'Connection stopped';
        }

        function nextPeer() {
            addMessage('Skipping to next user...', 'local');
            stopConnection();
            setTimeout(startSearching, 800);
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || !wc) return;
            wc.sendData(text);
            addMessage(text, 'local');
            chatInput.value = '';
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        window.onload = () => {
            // Show modal on load
            document.getElementById('authModal').style.display = 'flex';
        };
    </script>
</body>
</html>
