<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1" />
  <title>Fannalo Broadcast</title>
  <script src="https://cdn.jsdelivr.net/npm/webconnect@0.0.12/dist/umd/webconnect.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reconnecting-websocket/1.0.0/reconnecting-websocket.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root { --accent: #ff6b6b; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at 30% 20%, #0a0a1a, #020208);
      color: #f0f0f0;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100dvh;
    }
    .container { max-width: 1480px; margin: 0 auto; padding: 12px; height: 100dvh; display: flex; flex-direction: column; }
    h1 { text-align: center; font-size: clamp(1.8rem, 5vw, 2.8rem); background: linear-gradient(135deg, #FFB347, #FF6B6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 4px; font-weight: 700; }
    .sub { text-align: center; font-size: 0.95rem; opacity: 0.7; margin-bottom: 16px; }
    .info-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 16px; padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 0.9rem; margin-bottom: 20px; }
    .room-badge { background: #ff6b6b; color: #fff; padding: 2px 12px; border-radius: 9999px; font-weight: 600; font-size: 0.85rem; }
    .share-box { background: rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; margin: 12px 0; text-align: center; }
    .video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px; min-height: 0; }
    .video-wrapper { background: #111; border-radius: 20px; overflow: hidden; position: relative; aspect-ratio: 16/9; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .video-label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.7); color: white; padding: 6px 14px; border-radius: 9999px; font-size: 0.85rem; }
    .waiting-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #ffd700; padding: 20px 40px; border-radius: 12px; font-size: 1.3rem; font-weight: 600; }
    .control-bar { display: flex; gap: 10px; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 16px; margin-top: 12px; flex-wrap: wrap; }
    button { padding: 10px 20px; border: none; border-radius: 9999px; font-weight: 600; cursor: pointer; }
    .broadcaster { background: linear-gradient(90deg, #ff6b6b, #ff8e53); color: white; }
    .danger-btn { background: #ff4757; color: white; }
    .kick-btn { background: #ff4757; color: white; }
    .status-waiting { color: #ffd700; font-weight: 600; }
    .status-full { color: #ff4757; font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <h1>Fannalo Broadcast</h1>
  <div class="sub">Private P2P Room</div>

  <div class="info-card">
    <span>Room:</span> <span class="room-badge" id="roomDisplay">Loading...</span>
    <span id="status" class="status-connected">Initializing...</span>
    <span class="pill">Role: <span id="nodeRoleStat">none</span></span>
  </div>

  <div id="shareBox" class="share-box" style="display:none;">
    <strong>Share this link with your guest:</strong><br>
    <input id="shareLink" readonly style="width:85%; padding:10px; margin:8px 0; background:#1a1a2e; color:#fff; border:none; border-radius:8px;">
    <button onclick="copyLink()" style="padding:10px 16px;">📋 Copy</button>
  </div>

  <div class="video-section">
    <div class="video-grid" id="videoGrid"></div>
    <div class="control-bar" id="controlBar" style="display:none;">
      <button id="stopBtn" class="danger-btn">⏹️ Stop</button>
      <button id="muteMicABtn">🎤 Mute</button>
      <button id="kickGuestBtn" class="kick-btn" style="display:none;">👢 Kick Guest</button>
      <select id="qualitySelect">
        <option value="high">720p</option>
        <option value="medium" selected>540p</option>
        <option value="low">360p</option>
      </select>
    </div>
  </div>

  <div class="chat-section" style="margin-top:15px;">
    <div class="chat-header">💬 Chat</div>
    <div class="chat-messages" id="chatMessages" style="height:180px; overflow-y:auto; padding:15px;"></div>
    <div class="chat-input-area" id="chatInputArea" style="display:none; padding:10px;">
      <input id="chatInput" placeholder="Type message..." style="flex:1; padding:12px; border-radius:9999px; border:none; background:rgba(255,255,255,0.1); color:white;">
      <button id="sendChatBtn">Send</button>
    </div>
  </div>
</div>

<script>
  // Generate or get room ID
  const urlParams = new URLSearchParams(window.location.search);
  let roomId = urlParams.get('room') || 'fannalo-' + Math.random().toString(36).substr(2, 8);
  const isHost = urlParams.get('host') === '1';
  const isGuest = urlParams.get('guest') === '1';

  document.getElementById("roomDisplay").textContent = roomId;

  let webConnect = null;
  let localStream = null;
  let myRole = null;           // "host" or "guest"
  let myConnectId = null;
  let guestId = null;
  let myName = `User_${Math.random().toString(36).slice(2,6)}`;

  const doorbell = new Audio("https://www.soundjay.com/door_c2026/doorbell-6.mp3");
  let hasPlayedDoorbell = false;
  let remoteStreamShown = false;

  function setStatus(msg, type = "connected") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type === "waiting" ? "status-waiting" : type === "full" ? "status-full" : "status-connected";
  }

  function createVideo(stream, label, muted = false) {
    const wrapper = document.createElement("div");
    wrapper.className = "video-wrapper";
    wrapper.innerHTML = `<video autoplay playsinline ${muted?'muted':''}></video><div class="video-label">${label}</div>`;
    wrapper.querySelector("video").srcObject = stream;
    document.getElementById("videoGrid").appendChild(wrapper);
  }

  function showWaiting() {
    const div = document.createElement("div");
    div.className = "video-wrapper";
    div.id = "waitingBox";
    div.innerHTML = `<div class="waiting-label">Waiting for guest...</div>`;
    document.getElementById("videoGrid").appendChild(div);
  }

 async function initWebConnect() {
  if (webConnect) return;
  try {
    webConnect = webconnect({
      appName: "FannaloBroadcast",
      channelName: roomId,
      connectPassword: "entice2026",
      iceServers: [
        // Reliable public STUN servers (more stable than the old ones)
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
        { urls: "stun:stun.cloudflare.com:3478" },
        { urls: "stun:stun.metered.ca:3478" },           // Good alternative
        { urls: "stun:openrelay.metered.ca:80" }
      ]
      // We intentionally avoid custom torrentTrackers / nostrRelays here
      // because many are blocked or unstable now
    });

    webConnect.getMyId((attr) => {
      myConnectId = attr.connectId;
      console.log("My ID:", myConnectId);
    });

    webConnect.onConnect(async (attr) => {
      console.log("New peer:", attr.connectId);
      if (localStream) {
        webConnect.openStreaming(localStream, { connectId: attr.connectId });
      }
    });

    webConnect.onStreaming((stream, attr) => {
      if (attr.connectId === myConnectId || remoteStreamShown) return;
      remoteStreamShown = true;

      const waiting = document.getElementById("waitingBox");
      if (waiting) waiting.remove();

      createVideo(stream, myRole === "host" ? "Guest" : "Host");

      if (!hasPlayedDoorbell) {
        hasPlayedDoorbell = true;
        doorbell.play().catch(() => {});
      }

      setStatus("✅ Both cameras connected", "broadcast");
      if (myRole === "host") document.getElementById("kickGuestBtn").style.display = "inline-block";
    });

  } catch (e) {
    console.error("Connection init failed", e);
    setStatus("Connection issue – retrying", "waiting");
  }
}

  // Host starts automatically
  async function startHost() {
    myRole = "host";
    document.getElementById("nodeRoleStat").textContent = "Host";

    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    createVideo(localStream, "You (Host)", true);

    showWaiting();
    document.getElementById("controlBar").style.display = "flex";
    document.getElementById("chatInputArea").style.display = "flex";
    document.getElementById("shareBox").style.display = "block";

    const guestLink = `${window.location.origin}${window.location.pathname}?room=${roomId}&guest=1`;
    document.getElementById("shareLink").value = guestLink;

    await initConnection();
    setStatus("Waiting for guest...", "waiting");
  }

  // Guest joins
  async function startGuest() {
    myRole = "guest";
    document.getElementById("nodeRoleStat").textContent = "Guest";
    await initConnection();
    setStatus("Connecting to host...", "waiting");
  }

  function copyLink() {
    const linkInput = document.getElementById("shareLink");
    linkInput.select();
    document.execCommand("copy");
    alert("✅ Link copied! Send it to your guest.");
  }

  function kickGuest() {
    if (confirm("Kick the guest?")) {
      if (webConnect && guestId) {
        webConnect.closeStreaming?.(localStream, { connectId: guestId });
      }
      document.getElementById("videoGrid").innerHTML = "";
      createVideo(localStream, "You (Host)", true);
      showWaiting();
      document.getElementById("kickGuestBtn").style.display = "none";
      setStatus("Guest kicked. Waiting for new guest...", "waiting");
    }
  }

  // Main start logic
  async function startApp() {
    if (isHost) {
      await startHost();
    } else if (isGuest) {
      await startGuest();
    } else {
      document.getElementById("videoGrid").innerHTML = `<div style="color:#ff4757;text-align:center;padding:100px;font-size:1.5rem;">Not available.<br>Try again later.</div>`;
      setStatus("Room is full", "full");
    }
  }

  // Event listeners
  document.getElementById("stopBtn").onclick = () => location.reload();
  document.getElementById("kickGuestBtn").onclick = kickGuest;
  document.getElementById("muteMicABtn").onclick = () => {
    if (localStream) {
      const enabled = !localStream.getAudioTracks()[0].enabled;
      localStream.getAudioTracks().forEach(t => t.enabled = enabled);
      document.getElementById("muteMicABtn").textContent = enabled ? "🎤 Mute" : "🎤 Unmute";
    }
  };

  const chatInput = document.getElementById("chatInput");
  document.getElementById("sendChatBtn").onclick = () => {
    if (chatInput.value && webConnect) {
      webConnect.Send(chatInput.value, { connectId: null });
      addChatMessage(chatInput.value, true);
      chatInput.value = "";
    }
  };

  startApp();
</script>
</body>
</html>
